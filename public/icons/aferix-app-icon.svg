<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep Rich Premium Dark Gradient -->
    <radialGradient id="bg-radial" cx="50%" cy="30%" r="80%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#181a22"/>
      <stop offset="60%" stop-color="#0a0b0f"/>
      <stop offset="100%" stop-color="#030405"/>
    </radialGradient>

    <!-- Vibrant Amber/Gold Gradient for the trend line -->
    <linearGradient id="gold-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="50%" stop-color="#F5A400"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>

    <!-- Glow filter for premium neon/financial growth visual -->
    <filter id="glow-effect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Squircle Icon Base (Standard Adaptive squircle ratio) -->
  <rect width="496" height="496" x="8" y="8" rx="124" fill="url(#bg-radial)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="4"/>

  <!-- Subtle inner neon circular accent -->
  <circle cx="256" cy="256" r="220" stroke="rgba(245, 164, 0, 0.03)" stroke-width="2" fill="none"/>

  <!-- Stylized A / AX Monogram Symbol -->
  <g transform="translate(0, 10)">
    <!-- Left stem of the A (Off-white) -->
    <path d="M 180 370 L 256 160" stroke="#F5F1E8" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Right stem of the A (Off-white) -->
    <path d="M 256 160 L 332 370" stroke="#F5F1E8" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Upward trending crossbar (Gold Gradient) -->
    <!-- Starts from bottom-left, crosses A, and rises upward-right -->
    <path d="M 160 290 L 375 195" stroke="url(#gold-grad)" stroke-width="46" stroke-linecap="round" filter="url(#glow-effect)" />

    <!-- Intersecting leg of the X (Off-white/Gold) -->
    <!-- Crosses the trendline to form the 'X' signature of the monogram -->
    <path d="M 285 180 L 350 310" stroke="#F5F1E8" stroke-width="46" stroke-linecap="round" />
    <path d="M 285 180 L 315 240" stroke="url(#gold-grad)" stroke-width="46" stroke-linecap="round" />
  </g>
</svg>
