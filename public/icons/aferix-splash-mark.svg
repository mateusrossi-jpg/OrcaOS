<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aferix Stacked Premium</title>
  <desc id="desc">Stacked premium logo for the loading and onboarding screens of the Aferix app.</desc>
  <defs>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="50%" stop-color="#f5a400"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <g id="aferix-stacked">
    <!-- Big Symmetrical Premium Center Symbol X -->
    <rect x="75" y="65" width="90" height="14" rx="7" transform="rotate(45 120 72)" fill="#f5f1e8" />
    <rect x="75" y="65" width="90" height="14" rx="7" transform="rotate(-45 120 72)" fill="url(#gold-gradient)" />

    <!-- Wordmark below -->
    <text x="120" y="180" text-anchor="middle" font-family="'Outfit', 'Inter', 'Manrope', 'Sora', 'Segoe UI', sans-serif" font-size="34" font-weight="900" letter-spacing="3">
      <tspan fill="#f5f1e8">AFERI</tspan><tspan fill="url(#gold-gradient)">X</tspan>
    </text>
  </g>
</svg>
